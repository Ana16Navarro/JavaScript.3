    <script>
        /* Se DEFINE la función con sus parámetros
        function nombreFuncion(parametro1, parametreo2){
            //logica interna
            return resultado;
        }
        // Se LLAMA (ejecuta) la función con argumentos
        nombreFuncion(valor1, valor2);*/

        // Definición de la función
        function calcularArea(ancho, alto){
            const area = ancho * alto;
            return area;
        }
        // Llamadas a la función
        const area1 = calcularArea(5, 3);
        const area2 = calcularArea(10, 4);
        const area3 = calcularArea(7, 7);

        console.log(`Rectángulo 1 (5 x 3): ${area1} m2`); // 15m 
        console.log(`Rectángulo 1 (10 x 4): ${area2} m2`); // 40m 
        console.log(`Rectángulo 1 (7 x 7): ${area3} m2`); // 49m
    </script>
