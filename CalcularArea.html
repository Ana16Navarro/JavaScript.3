<h1>Historia la navegador</h1>
        <script>
            //Definición de la función
            function calcularArea(ancho,alto){
                const area = ancho * alto;
                return area;
            }

            // LLamada a la función
            const area1 = calcularArea (5, 3);
            const area2 = calcularArea (10, 4);
            const area3 = calcularArea (7, 7);
            
            console.log ('Rectangulo 1 (5 x 3): ${area1}m2');    //15 m2
            console.log ('Rectangulo 2 (10 x 4): ${area2} m2');  //40 m2
            console.log('Rectangulo 3 (7 x 7): ${area3} m2');    //49 m2
        </script>
